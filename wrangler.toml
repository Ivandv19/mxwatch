# Configuración de despliegue para Cloudflare Pages con output estático de Next.js.

# Nombre único del proyecto en Cloudflare Dashboard.
name = "mxwatch"

# Fecha de compatibilidad con las APIs de Cloudflare Workers/Pages.
# Define el conjunto de runtime features disponibles.
compatibility_date = "2026-04-30"

# Directorio de salida del build de Next.js que Cloudflare Pages servirá como estáticos.
# Generado por Vercel/Next.js builder antes del deploy.
pages_build_output_dir = ".vercel/output/static"

# Variables de entorno públicas
[vars]
NODE_VERSION = "24.14.1"
BUN_VERSION = "1.3.13"
NEXT_BUNDLER = "bun"
